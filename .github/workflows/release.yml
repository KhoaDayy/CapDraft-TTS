name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v (e.g. 1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - name: Sync deps + build
        shell: pwsh
        run: |
          uv sync --frozen --group dev
          uv run --frozen pyinstaller --noconfirm --clean CapDraft-TTS.spec

      - name: Package zip + sha256
        shell: pwsh
        run: |
          $Version = "${{ steps.ver.outputs.version }}"
          $ReleaseDir = "release"
          New-Item -ItemType Directory -Force $ReleaseDir | Out-Null
          $Archive = Join-Path $ReleaseDir "CapDraft-TTS-v$Version-windows-x64.zip"
          if (Test-Path $Archive) { Remove-Item -LiteralPath $Archive -Force }
          Compress-Archive -Path "dist\CapDraft-TTS\*" -DestinationPath $Archive -CompressionLevel Optimal
          $Hash = (Get-FileHash -Algorithm SHA256 $Archive).Hash.ToLowerInvariant()
          "$Hash  $(Split-Path -Leaf $Archive)" | Set-Content -Encoding ascii "$Archive.sha256"
          Write-Host "Built: $Archive"
          Write-Host "SHA256: $Hash"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: CapDraft TTS ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            release/CapDraft-TTS-v${{ steps.ver.outputs.version }}-windows-x64.zip
            release/CapDraft-TTS-v${{ steps.ver.outputs.version }}-windows-x64.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
